# config/builtin_models.yaml — declarative built-in models for WeKnora
# Models are auto-synced to DB on startup (is_builtin=true)

builtin_models:
  - id: builtin-llm-default
    type: KnowledgeQA
    source: remote
    is_default: true
    name: ${LLM_MODEL_NAME}
    parameters:
      base_url: ${LLM_BASE_URL}
      api_key: ${LLM_API_KEY}
      provider: ${LLM_PROVIDER}
      # 说明：如果默认模型是会“思考”的 vLLM 模型（如 qwen3-235b /
      # Qwen3-235B-A22B-Thinking），需要在这里加：
      #   extra_config:
      #     thinking_control: chat_template_kwargs
      # 才能让 WeKnora 真正下发 enable_thinking=false 关掉思考，否则最终流式
      # 生成会因思考首 token 太慢触发 Stream inactivity timeout。
      # 当前默认是 Claude（anthropic::claude-4-8-opus，自适应思考，不吃这个开关），
      # 故不设 extra_config。

  - id: builtin-llm-summary
    type: KnowledgeQA
    source: remote
    is_default: false
    name: ${SUMMARY_MODEL_NAME}
    parameters:
      base_url: ${SUMMARY_BASE_URL}
      api_key: ${SUMMARY_API_KEY}
      provider: ${SUMMARY_PROVIDER}

  - id: builtin-embedding-default
    type: Embedding
    source: remote
    is_default: true
    name: ${EMBEDDING_MODEL_NAME}
    parameters:
      base_url: ${EMBEDDING_BASE_URL}
      api_key: ${EMBEDDING_API_KEY}
      provider: ${EMBEDDING_PROVIDER}
      embedding_parameters:
        dimension: 1024
        truncate_prompt_tokens: 0

  - id: builtin-rerank-default
    type: Rerank
    source: remote
    is_default: true
    name: ${RERANK_MODEL_NAME}
    parameters:
      base_url: ${RERANK_BASE_URL}
      api_key: ${RERANK_API_KEY}
      provider: ${RERANK_PROVIDER}

  - id: builtin-vlm-default
    type: VLLM
    source: remote
    is_default: true
    name: ${VLM_MODEL_NAME}
    parameters:
      base_url: ${VLM_BASE_URL}
      api_key: ${VLM_API_KEY}
      provider: ${VLM_PROVIDER}
